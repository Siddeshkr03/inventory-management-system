server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/formdata
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  liquibase:
    enabled: false
    change-log: classpath:scripts/changelog-mysql.xml

  application:
    name: Forms

app:
  frontend:
    url: http://localhost:5173/